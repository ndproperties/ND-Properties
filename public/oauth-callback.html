<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating...</title>
</head>
<body style="background-color: #fafaf9; color: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center;">
  <div style="background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #f3f3f2; max-width: 320px; width: 90%;">
    <div style="width: 40px; height: 40px; border: 3px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem auto;"></div>
    <h2 style="margin: 0 0 0.5rem 0; font-size: 1.25rem; font-weight: 700;">Securing Session</h2>
    <p style="margin: 0; font-size: 0.875rem; color: #71716a; font-weight: 500;">Completing verification, this window will close automatically...</p>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    // Parse the URL hash fragment containing tokens
    const hash = window.location.hash;
    if (hash) {
      // Safely message token parameters back to parent page
      if (window.opener) {
        window.opener.postMessage({
          type: 'supabase-oauth-callback',
          hash: hash
        }, window.location.origin);
      }
    }
    // Close the popup window
    setTimeout(() => {
      window.close();
    }, 500);
  </script>
</body>
</html>
